services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: badminton_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - badminton_events_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
volumes:
  badminton_events_data:
